<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dhvani – Music for You</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="landing-container">

  <nav>
    <div class="logo">Dhvani</div>
    <div class="nav-links">
      <a href="#">Discover</a>
      <a href="#">Premium</a>
      <a href="#">Login</a>
      <button class="signup-btn">Sign Up</button>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-text">
      <h1>Your Music. Your Vibe</h1>
      <p>Stream millions of songs, podcasts, and playlists tailored just for you</p>
      <div class="hero-buttons">
        <button class="primary-btn">Start Listening</button>
        <button class="secondary-btn">Explore</button>
      </div>
    </div>

    <div class="hero-image">
      <img alt="" src="https://images.unsplash.com/photo-1511379938547-c1f69419868d" />
    </div>
  </section>

  <section class="features">
    <div class="feature-card">
      <h3>Personalized Playlists</h3>
      <p>Music picked based on your taste</p>
    </div>

    <div class="feature-card">
      <h3>Offline Mode</h3>
      <p>Download and listen anywhere</p>
    </div>

    <div class="feature-card">
      <h3>High-Quality Audio</h3>
      <p>Crystal clear sound experience</p>
    </div>
  </section>

</div>

</body>
</html>
