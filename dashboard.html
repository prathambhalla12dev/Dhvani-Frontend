<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Dhvani</title>
  </head>
  <body>
    <h2>Add Artist</h2>
    <div id="addArtist">
      <input id="artistName" placeholder="Artist name" />
      <button id="addArtistButton">Add Artist</button>
      <p id="resultAddArtist"></p>
    </div>

    <h2>Add Song</h2>
    <div id="addSong">
      <input id="songTitle" placeholder="Song title" />
      <input id="songUrl" placeholder="Song URL" />
      <input id="songArtist" placeholder="Artist name" />
      <button id="addSongButton">Add Song</button>
      <p id="resultAddSong"></p>
    </div>
  </body>
</html>
