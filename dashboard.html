<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dhvani | Admin Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

<main class="content">

  <header class="topbar">
    <h1>Dhvani – Admin Control Panel</h1>
  </header>

  <section class="panel">

    <h2>Add Artist</h2>

    <div class="form-row">
      <label for="artistName"></label><input id="artistName" type="text" placeholder="Artist Name" required>
      <button id="addArtistBtn">Add Artist</button>
    </div>

  </section>

  <section class="panel">

    <h2>Add Song</h2>

    <div class="form-row">
      <label for="songTitle"></label><input id="songTitle" type="text" placeholder="Song Title" required>
      <label for="songUrl"></label><input id="songUrl" type="url" placeholder="Song URL" required>
      <label for="songArtist"></label><input id="songArtist" type="text" placeholder="Artist Name" required>
      <button id="addSongBtn">Add Song</button>
    </div>

  </section>

  <section class="panel">

    <h2>Recently Added Songs</h2>

    <table>
      <thead>
      <tr>
        <th>Song</th>
        <th>Artist</th>
        <th>URL</th>
      </tr>
      </thead>
      <tbody id="songsTable"></tbody>
    </table>

  </section>

</main>

</body>
</html>
